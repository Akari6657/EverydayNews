sources:
  - name: "New York Times"
    slug: "nyt"
    feeds:
      - url: "https://rss.nytimes.com/services/xml/rss/nyt/World.xml"
        category: "world"
        exclude_keywords:
          ["here's the latest", "live updates", "mapping the scale", "tell us here", "what we know", "dies at", "dies aged"]
        exclude_categories: ["Opinion"]
      - url: "https://rss.nytimes.com/services/xml/rss/nyt/Business.xml"
        category: "business"
        exclude_keywords:
          ["here's the latest", "live updates", "mapping the scale", "tell us here", "what we know", "dies at", "dies aged"]
        exclude_categories: ["Opinion"]
      - url: "https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml"
        category: "technology"
        exclude_keywords:
          ["here's the latest", "live updates", "mapping the scale", "tell us here", "what we know", "dies at", "dies aged"]
        exclude_categories: ["Opinion"]

  - name: "BBC News"
    slug: "bbc"
    feeds:
      - url: "http://feeds.bbci.co.uk/news/world/rss.xml"
        category: "world"
        exclude_keywords:
          ["live:", "weather", "football", "horse racing", "dies aged", "critical condition", "stabbing", "search for mother"]
        exclude_categories: ["Sport", "Weather", "Entertainment"]
      - url: "http://feeds.bbci.co.uk/news/business/rss.xml"
        category: "business"
        exclude_keywords:
          ["live:", "weather", "football", "horse racing", "dies aged", "critical condition", "stabbing"]
        exclude_categories: ["Sport", "Weather", "Entertainment"]

  - name: "The Guardian"
    slug: "guardian"
    feeds:
      - url: "https://www.theguardian.com/world/rss"
        category: "world"
        exclude_keywords:
          ["live:", "as it happened", "football", "dies aged", "critical condition", "stabbing", "family demands answers", "after death of"]
        exclude_categories: ["Sport", "Football"]

  - name: "Al Jazeera English"
    slug: "aljazeera"
    feeds:
      - url: "https://www.aljazeera.com/xml/rss/all.xml"
        category: "top"
        exclude_keywords: ["live:", "analysis", "explainer"]
        exclude_categories: ["Sport"]

  - name: "Deutsche Welle"
    slug: "dw"
    feeds:
      - url: "https://rss.dw.com/xml/rss-en-all"
        category: "top"
        exclude_keywords: ["live:", "analysis", "explainer"]

  - name: "NPR"
    slug: "npr"
    feeds:
      - url: "https://feeds.npr.org/1001/rss.xml"
        category: "top"

pipeline:
  max_articles_per_source: 15
  importance_threshold: 5
  exclude_summary_keywords: ["最新动态", "持续更新", "直播", "live updates", "here's the latest"]

dedup:
  method: "embedding"
  model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  cache_embeddings: true
  within_thread:
    similarity_threshold: 0.88

thread_clustering:
  provider: "deepseek"
  model: "deepseek-chat"
  max_retries: 2
  max_articles_per_call: 150
  max_articles_per_thread: 12
  max_refinement_rounds: 1
  enable_post_merge: true
  merge_overlap_threshold: 0.30
  enable_chunk_merge: true

ranking:
  importance_floor: 0.15
  keep_major_always: true

summarizer:
  map:
    batch_size: 5
    max_retries: 2
  reduce:
    top_k: 15
    max_retries: 2


llm:
  provider: "deepseek"
  model: "deepseek-chat"
  base_url: "https://api.deepseek.com"
  api_key_env: "DEEPSEEK_API_KEY"
  max_tokens: 4096
  temperature: 0.3

output:
  markdown:
    directory: "output/md"
    group_by_month: true
  json:
    enabled: true
    directory: "output/json"
    group_by_month: true
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    sender: ""
    recipients: []
  telegram:
    enabled: false
    bot_token_env: "TELEGRAM_BOT_TOKEN"
    chat_id_env: "TELEGRAM_CHAT_ID"

schedule:
  timezone: "Asia/Shanghai"
  run_at: "08:00"
